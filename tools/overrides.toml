# overrides.toml
#
# Store custom prose that cannot be auto-generated from naming conventions.
#
# Keys match the header path relative to include/, without extension and
# with forward slashes. Example: "vision/implementation/detection/obstacle_detector"
#
# Within each section:
#   __overview__           = overview paragraph (Markdown)
#   __constructor__        = constructor description
#   method_name            = description for that method
#   method_name.param_name = description for a specific parameter
#
# Descriptions already handled by naming conventions (get_*/set_*,
# on_setup, on_teardown, on_update, setup, teardown, ...) do NOT need
# entries here unless you want to override the generated text.

[__namespaces__]
core = "The `acs::core` namespace provides the foundational component system for the autonomous control system. It defines interfaces and base classes for managing component lifecycles, updates, and threaded execution."
utility = "The `acs::utility` namespace contains helper components and interfaces for common functionality such as configuration file parsing and Zenoh communication."
vision = "The `acs::vision` namespace contains components for camera access, scene understanding, and visualization. It implements the detection pipeline for obstacles using ZED stereo camera hardware."

# ---------------------------------------------------------------------------
# core
# ---------------------------------------------------------------------------

["core/implementation/component"]
__overview__ = "Concrete implementation of [`i_component`](../interfaces/i_component.md). Provides the base component with name management and setup/teardown lifecycle."

["core/implementation/updatable_component"]
__overview__ = "Concrete implementation of [`i_updatable_component`](../interfaces/i_updatable_component.md). Extends [`component`](component.md) and adds a single `update()` cycle."
on_update = "Calls `on_update()` to execute one update step."

["core/implementation/threaded_component"]
__overview__ = "Base class for components that execute on a dedicated thread. Extends [`updatable_component`](updatable_component.md) and implements [`i_threaded_component`](../interfaces/i_threaded_component.md), managing thread lifecycle and update-rate timing."
on_setup = "Reads the configured update rate and prepares the thread."
on_teardown = "Signals the thread to stop and waits for it to join."

["core/interfaces/i_component"]
__overview__ = "Base interface for all components. Defines the setup/teardown lifecycle and name accessors that every component must implement."

["core/interfaces/i_updatable_component"]
__overview__ = "Interface for components that support a repeated update cycle. Extends [`i_component`](i_component.md)."

["core/interfaces/i_threaded_component"]
__overview__ = "Interface for components that run their update loop on a dedicated thread. Extends [`i_updatable_component`](i_updatable_component.md) and adds thread start/stop control and mutex access."
"get_update_rate" = "Returns the configured update rate in Hz for the component's update loop."
"set_update_rate" = "Sets the update rate in Hz for the component's update loop."
"set_update_rate.update_rate" = "The desired update rate in Hz."

