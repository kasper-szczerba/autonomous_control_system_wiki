["vision/implementation/zed_camera"]
__overview__ = "Concrete ZED camera component for the vision pipeline. Extends [`threaded_component`](../../core/implementation/threaded_component.md) and implements [`i_zed_camera`](../interfaces/i_zed_camera.md), managing camera setup, frame acquisition, and teardown."
on_setup = "Initializes the ZED camera hardware and runtime parameters."
on_update = "Captures frames from the camera and updates internal matrices."
on_teardown = "Closes the ZED camera and releases resources."

["vision/interfaces/i_zed_camera"]
__overview__ = "Interface for the ZED stereo camera. Exposes GPU-resident color and depth frames together with camera metrics and native SDK access."

["vision/implementation/detection/floor_detector"]
__overview__ = "Threaded component that detects the floor plane from ZED depth data. Extends [`threaded_component`](../../../core/implementation/threaded_component.md) and implements [`i_floor_detector`](../../interfaces/detection/i_floor_detector.md)."
on_setup = "Reads floor-detection configuration and initializes plane-fitting parameters."
on_update = "Runs floor-plane detection on the latest depth frame."

["vision/interfaces/detection/i_floor_detector"]
__overview__ = "Interface for floor-plane detection in the vision subsystem. Provides the detected plane equation and a flag indicating whether a floor has been found."

["vision/implementation/detection/obstacle_detector"]
__overview__ = "Threaded component that detects obstacles using depth data and floor geometry. Extends [`threaded_component`](../../../core/implementation/threaded_component.md) and implements [`i_obstacle_detector`](../../interfaces/detection/i_obstacle_detector.md), exposing thresholds, contour data, and bounding boxes."
on_setup = "Reads obstacle-detection thresholds and configuration parameters."
on_update = "Performs obstacle detection using depth data and floor-plane information."

["vision/interfaces/detection/i_obstacle_detector"]
__overview__ = "Interface for obstacle detection in the vision subsystem. Extends [`i_threaded_component`](../../../core/interfaces/i_threaded_component.md) and defines accessors for detection thresholds, contour data, bounding boxes, and the linked floor detector."
get_floor_detector_ptr = "Returns the linked floor detector."
get_contours = "Returns the detected obstacle contours."
get_union_box = "Returns the combined bounding box enclosing all detected obstacles."
get_individual_boxes = "Returns the individual bounding boxes for each detected obstacle."
get_last_crop = "Returns the latest cropped image region corresponding to the union box."

["vision/implementation/helpers/floor_plane_math"]
__overview__ = "Mathematical helper utilities for floor-plane calculations in 3D space. Provides lightweight data structures and functions for plane orientation, normal metrics, pixel re-projection, and point-to-plane distance."
orient_plane_up = "Normalises the plane orientation so the normal vector points upward."
normal_length = "Computes the length of the plane normal vector."
reproject_depth_pixel = "Reprojects a depth pixel into 3D camera space using intrinsic parameters."
absolute_distance_to_plane = "Computes the absolute perpendicular distance from a 3D point to a plane."
"orient_plane_up.equation" = "The raw plane equation from the ZED SDK (`sl::float4`)."
"normal_length.coefficients" = "The plane coefficients to compute the normal length for."
"reproject_depth_pixel.x" = "Pixel x-coordinate."
"reproject_depth_pixel.y" = "Pixel y-coordinate."
"reproject_depth_pixel.z" = "Depth value at the pixel."
"reproject_depth_pixel.fx" = "Focal length in x."
"reproject_depth_pixel.fy" = "Focal length in y."
"reproject_depth_pixel.cx" = "Principal point x-coordinate."
"reproject_depth_pixel.cy" = "Principal point y-coordinate."
"absolute_distance_to_plane.point" = "The point in 3D space."
"absolute_distance_to_plane.plane" = "The plane coefficients."
"absolute_distance_to_plane.plane_normal_length" = "Precomputed normal length for the plane."

["vision/implementation/helpers/floor_plane_math".plane_coefficients]
__description__ = "Represents the coefficients of a plane equation `ax + by + cz + d = 0`."
a = "Coefficient for the x component."
b = "Coefficient for the y component."
c = "Coefficient for the z component."
d = "The constant (offset) term."

["vision/implementation/helpers/floor_plane_math".point3]
__description__ = "Represents a 3D point in Cartesian coordinates."
x = "X-axis coordinate."
y = "Y-axis coordinate."
z = "Z-axis coordinate."

["vision/implementation/helpers/matrix_converter"]
__overview__ = "Utility class for converting matrix data between ZED SDK (`sl::Mat`) and OpenCV CUDA (`cv::cuda::GpuMat`) formats for both color and depth frames."
convert_color_to_gpu_mat = "Converts a ZED color matrix to an OpenCV CUDA matrix."
convert_depth_to_gpu_mat = "Converts a ZED depth matrix to an OpenCV CUDA matrix."
convert_color_to_sl_mat = "Converts an OpenCV CUDA color matrix to ZED SDK format."
convert_depth_to_sl_mat = "Converts an OpenCV CUDA depth matrix to ZED SDK format."

